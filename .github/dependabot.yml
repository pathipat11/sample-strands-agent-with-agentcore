version: 2
updates:
  - package-ecosystem: npm
    directory: /chatbot-app/frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      frontend-dev:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /mobile-app
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      mobile-dev:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /chatbot-app/agentcore
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
